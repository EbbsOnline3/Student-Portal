{% extends "main.html" %}

{% block head %}
  <title> Get Started Page </title>
{% endblock %}

{% block get_started_active %}
 class='active'
{% endblock %}

{% block content %}
  <form action="#" method="post" class="form-signin">
    <h2 class="form-signin-heading">Student Portal Form</h2>
    <div class="personal-info">
      <div class="col-md-6 upload">
        <p>Peronal Information</p>
        <label for="inputfile" class="">Upload Image:</label>
        <input type="file" id="inputfile" class="form-control" placeholder="Email address" required autofocus>
      </div>
      <div class="col-md-6">
        <label for="input-first-name" class="">First Name:</label>
        <input type="text" id="input-first-name" class="form-control" placeholder="first name" required>
      </div>
      <div class="col-md-6">
        <label for="input-middle-name" class="">Middle Name:</label>
        <input type="text" id="input-middle-name" class="form-control" placeholder="Middle name">
      </div>
      <div class="col-md-6">
        <label for="input-last-name" class="">Last Name:</label>
        <input type="text" id="input-last-name" class="form-control" placeholder="Last name" required>
      </div>
      <div class="col-md-6">
        <label for="input-email" class="">Emial:</label>
        <input type="text" id="input-email" class="form-control" placeholder="student@gmial.com" required>
      </div>
      <div class="col-md-6">
        <label for="input-date-of-birth" class="">Date of birth:</label>
        <input type="date" id="input-date-of-birth" class="form-control" placeholder="Date of birth" required>
      </div>
      <div class="col-md-6 radios">
        <label for="male">Male</label>
        <input type="radio" name="gender" id='male' class="gender" value="male" required>
        <label for="female">Female</label>
        <input type="radio" name="gender" id='female' class="gender" value="female" required>
      </div>
      <div class="col-md-6">
        <label for="input-number">Phone Number:</label>
        <input type="tel" id="input-number"  class="form-control" placeholder="+233 500 000 000" required>
      </div>
      <div class="col-md-6">
        <label for="input-address">Address:</label>
        <textarea id="input-address" class="form-control" required placeholder="your address" ></textarea>
      </div>
      <div class="col-md-6">
        <label for="region">Select Region:</label>
        <select name="region" class="form-control" id="region" required>
          <option value="">-- Select Region --</option>
          {% for region in regions %}
            <option value="{{ region }}">
              {{ region }}
            </option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label for="district">District:</label>
        <select name="district" class="form-control" id="district" required>
          <option value="">-- Select District --</option>
        </select>
      </div>
      <div class="col-md-6">
        <label for="input-next-of-king">Next of King:</label>
        <input type="text" id="input-next-of-king" class="form-control" placeholder="your next of king" required>
      </div>
    </div>
    <!-- Academic info -->
    <div class="academic-info">
      <p>Academic Information</p>
      <div class="col-md-12 result"> 
        <label for="wassce">Exam Score:</label>
        <input type="number" name="wassce" class="form-control" id="wassce" placeholder="input WASSCE result" required>
      </div>
    </div>
    <div class="submit-form">
      <button type="submit" class="btn btn-primary" id="submit-btn">Submit</button>
    </div>
  </form>

  <script>
    const districtsByRegion = {{ districts_by_region | tojson }};
    console.log(districtsByRegion);
    
    document.getElementById('region').addEventListener('change', function() {
      const selectedRegion = this.value;
      const districtSelect = document.getElementById('district');
      
      // Clear previous districts
      districtSelect.innerHTML = '<option value="">-- Select District --</option>';
      
      // If a region is selected, populate districts
      if (selectedRegion && districtsByRegion[selectedRegion]) {
        districtsByRegion[selectedRegion].forEach(function(district) {
          const option = document.createElement('option');
          option.value = district;
          option.textContent = district;
          districtSelect.appendChild(option);
        });
      }
    });
  </script>

  <div class="col-md-12 students-table">
    <p><b>Info!</b> All students records table</p>
  </div>
{% endblock %}
